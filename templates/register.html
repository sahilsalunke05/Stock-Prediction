<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | Stock Predictor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(120deg, #ff6a00, #ee0979);
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }
        .register-box {
            background: linear-gradient(135deg, #fff, #fdf2f8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
            border-left: 5px solid #ff6a00;
            border-right: 5px solid #ee0979;
            width: 90%;
            max-width: 400px;
            animation: floatIn 0.6s ease;
        }
        .register-box h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }
        .register-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #f9f9f9;
            transition: 0.2s;
        }
        .register-box input:focus {
            border-color: #ee0979;
            outline: none;
            background-color: #fff;
        }
        .register-box button {
            width: 100%;
            padding: 12px;
            background: #ee0979;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
        .register-box button:hover {
            background: #c60061;
        }
        .register-box p {
            text-align: center;
        }
        .register-box a {
            color: #ee0979;
            text-decoration: none;
            font-weight: bold;
        }
        .flash-msg {
            text-align: center;
            color: red;
            font-size: 0.9em;
        }
        @keyframes floatIn {
            from { transform: translateY(-40px); opacity: 0; }
            to   { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 500px) {
            .register-box {
                padding: 20px;
            }
            input, button {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>📝 Register</h2>
        <form method="POST">
            <input type="email" name="email" placeholder="Email" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        {% with messages = get_flashed_messages() %}
            {% for msg in messages %}
                <div class="flash-msg">{{ msg }}</div>
            {% endfor %}
        {% endwith %}
    </div>
</body>
</html>
